version: 2.1

orbs:
  hugo: circleci/hugo@1.2.2
  aws-s3: circleci/aws-s3@3.0.0

jobs:
  stagingDeploy:
    docker:
      - image: 'circleci/python:latest'
    steps:
      - checkout
      - aws-s3/sync:
           from: ./public'
           to: 's3://a11ystaging'
           arguments: |
             --acl public-read \
             --cache-control "max-age=86400"

  prodDeploy:
    docker:
      - image: 'circleci/python:latest'
    steps:
      - checkout
      - aws-s3/sync:
           from: 's3://a11ystaging'
           to: 's3://mobilea11y.com'
           arguments: |
             --acl public-read \
             --cache-control "max-age=86400"

  build:
    docker:
      - image: 'cibuilds/hugo:latest'
    steps: 
      - checkout
      - run: git submodule sync
      - run: git submodule update --init

      - hugo/hugo-build:
          extra-flags: '--minify'
          destination: ./public
          source: .

  test:
    parameters:
      testResultsDir:
        type: string
        default: artefacts/testResults
    docker:
      - image: 'cibuilds/hugo:latest'
    - hugo/html-proofer:
        path: ./public
        disable-external: false
        check-html: true
        check-img-http: true
        empty-alt-ignore: false
        enforce-https: true
        log-level: :warn
        storage-dir: << parameters.testResultsDir >>
          
    - store_artifacts:
        path: << parameters.testResultsDir >>

workflows:
  main:
    jobs:
      - build

      - test

      - stagingDeploy:
          filters:
            branches:
              only: master
          requires:
            - build

  prodDeploy:
      jobs:
        - prodDeploy:
            filters:
              branches:
                only: master

               

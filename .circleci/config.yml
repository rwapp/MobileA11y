jobs:
  deploy:
    docker:
      - image: 'circleci/python:latest'
    steps:
      - checkout
      - aws-s3/sync:
           from: ./public
           to: 's3://mobilea11y.com'
           arguments: |
             --acl public-read \
             --cache-control "max-age=86400"
           overwrite: true

  
orbs:
  hugo: circleci/hugo@0.2
  aws-s3: circleci/aws-s3@1.0.15
version: 2.1
workflows:
  main:
    jobs:
      - hugo/build:
          html-proofer: true
          version: '0.70'
      - deploy:
          filters:
            branches:
              only: master
          requires:
            - hugo/build
               

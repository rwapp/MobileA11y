
parameters:
  deployTo:
    default: 's3://a11ystaging'
    type: enum
    description: 'Environment to deploy to'
    enum: ['s3://a11ystaging', 's3://mobilea11y.com']


jobs:
  deploy:
    docker:
      - image: 'circleci/python:latest'
    steps:
      - checkout
      - aws-s3/sync:
           from: ./public
           to: '<< pipeline.parameters.deployTo >>'
           arguments: |
             --acl public-read \
             --cache-control "max-age=86400"
           overwrite: true

  
orbs:
  hugo: circleci/hugo@1.2.2
  aws-s3: circleci/aws-s3@1.0.15
version: 2.1
workflows:
  main:
    jobs:
      - hugo/build:
          hugo-extra-flags: '--minify'
          version: '0.91.2'
          destination: ./public
      - deploy:
          filters:
            branches:
              only: master
          requires:
            - hugo/build
               

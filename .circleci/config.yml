version: 2.1

orbs:
  hugo: circleci/hugo@1.3.0
  aws-s3: circleci/aws-s3@3.0.0

jobs:
  stagingDeploy:
    docker:
      - image: 'circleci/python:latest'
    steps:
      - checkout
      - aws-s3/sync:
           from: ./public'
           to: 's3://a11ystaging'
           arguments: |
             --acl public-read \
             --cache-control "max-age=86400"

  prodDeploy:
    docker:
      - image: 'circleci/python:latest'
    steps:
      - checkout
      - aws-s3/sync:
           from: 's3://a11ystaging'
           to: 's3://mobilea11y.com'
           arguments: |
             --acl public-read \
             --cache-control "max-age=86400"

  build:
    docker:
      - image: 'cibuilds/hugo:latest'
    steps: 
      - hugo/hugo-build:
          extra-flags: '--minify'
          destination: ./public
      - hugo/html-proofer:
          disable-external: false

workflows:
  main:
    jobs:
      - build

      - stagingDeploy:
          filters:
            branches:
              only: master
          requires:
            - build

  prodDeploy:
      jobs:
        - prodDeploy:
            filters:
              branches:
                only: master

               

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.158.0"
          extended: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build
        run: hugo --minify
        env:
          HUGO_ENVIRONMENT: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.158.0"
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build
        run: hugo --minify
        env:
          HUGO_ENVIRONMENT: production

      - name: Verify Internal Link Destinations
        run: node ./scripts/verify-internal-links.mjs --public ./public --site-prefix /MobileA11y/

      - name: Compare Route Inventory With Baseline
        shell: bash
        run: |
          set -euo pipefail

          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            BASE_REF="HEAD^"
          else
            echo "No prior commit available for baseline route comparison; skipping."
            exit 0
          fi

          BASELINE_DIR="$(mktemp -d)"
          echo "Using baseline ref ${BASE_REF} in ${BASELINE_DIR}"

          git worktree add --detach "${BASELINE_DIR}" "${BASE_REF}"
          trap 'git worktree remove --force "${BASELINE_DIR}"' EXIT

          (
            cd "${BASELINE_DIR}"
            git submodule update --init --recursive
            HUGO_ENVIRONMENT=production hugo --minify
          )

          node ./scripts/compare-route-inventory.mjs --current ./public --baseline "${BASELINE_DIR}/public"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install HTMLProofer
        run: gem install html-proofer

      - name: Run HTMLProofer
        run: |
          htmlproofer ./public \
            --enforce-https \
            --checks "Links,Images,Scripts" \
            --root-dir ./public \
            --url-swap "^/MobileA11y/:/" \
            --ignore-status-codes "302,403,999" \
            --ignore-urls "/^https:\/\/rwapp\.github\.io\/MobileA11y\//,/^https:\/\/twitter\.com\//,/^https:\/\/x\.com\//,/^http:\/\/mirrors\.creativecommons\.org/"
        continue-on-error: false

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
